### LLaMA-Factory QLoRA config — debugger expert
### run:  llamafactory-cli train train/debugger.yaml

### model (single frozen base, shared by all three experts)
model_name_or_path: Qwen/Qwen2.5-Coder-1.5B-Instruct   # 端侧默认(CPU 可跑)；有显卡/高配机器可改 3B
quantization_bit: 4          # QLoRA (4-bit) — 单张 3090(24GB) 绰绰有余

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: leap_debugger
dataset_dir: data           # points at data/dataset_info.json
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: adapters/debugger
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### eval
val_size: 0.05
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 200
